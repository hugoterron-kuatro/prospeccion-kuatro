<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospección de Campo - Kuatro Modulares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; }
        /* Personalización de los checkbox seleccionados */
        input[type="checkbox"]:checked + label {
            border-color: #f97316;
            background-color: rgba(249, 115, 22, 0.1);
        }
    </style>
</head>
<body class="text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
        
        <div class="bg-gradient-to-r from-slate-900 to-slate-850 p-6 text-center border-b border-slate-700">
            <div class="flex justify-center items-center gap-2 mb-2">
                <i class="fa-solid fa-cubes text-orange-500 text-3xl"></i>
                <span class="text-2xl font-black tracking-wider text-white">KUATRO<span class="text-orange-500">.</span></span>
            </div>
            <h1 class="text-lg font-bold text-slate-300 tracking-wide uppercase">Prospección de Campo</h1>
            <p class="text-xs text-slate-500 mt-1">Registro ágil de nuevas oportunidades comerciales</p>
        </div>

        <form id="campo-form" class="p-6 space-y-5" onsubmit="handleFormSubmit(event)">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Vendedor *</label>
                    <select id="vendedor" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm">
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="Hugo Terrón">Hugo Terrón</option>
                        <option value="Asesor 1">Asesor 1</option>
                        <option value="Asesor 2">Asesor 2</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Sucursal *</label>
                    <select id="sucursal" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm">
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="Bajío">Kuatro Bajío</option>
                        <option value="Centro">Kuatro Centro</option>
                        <option value="Norte">Kuatro Norte</option>
                    </select>
                </div>
            </div>

            <hr class="border-slate-700 my-2">

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Nombre del Contacto *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-user text-sm"></i></span>
                    <input type="text" id="contact_name" required class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Nombre de la persona">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Empresa / Razón Social *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-building text-sm"></i></span>
                    <input type="text" id="company_name" required class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Nombre del negocio o empresa">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Teléfono <span class="text-slate-500 text-[10px]">(Opcional)</span></label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-phone text-sm"></i></span>
                        <input type="tel" id="phone" class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="10 dígitos">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Correo Electrónico <span class="text-slate-500 text-[10px]">(Opcional)</span></label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-envelope text-sm"></i></span>
                        <input type="email" id="email" class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="correo@empresa.com">
                    </div>
                </div>
            </div>

            <hr class="border-slate-700 my-2">

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Especificación del Espacio Requerido * <span class="text-orange-400 text-[10px]">(Puedes elegir varios)</span></label>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div>
                        <input type="checkbox" id="prod_caseta" name="product_line" value="Caseta Móvil" class="hidden">
                        <label for="prod_caseta" class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all">
                            <span>Casetas Móviles</span> <i class="fa-solid fa-trailer text-slate-500"></i>
                        </label>
                    </div>
                    <div>
                        <input type="checkbox" id="prod_flex" name="product_line" value="Flexpace" class="hidden">
                        <label for="prod_flex" class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all">
                            <span>Flexpace</span> <i class="fa-solid fa-cubes-stacked text-slate-500"></i>
                        </label>
                    </div>
                    <div>
                        <input type="checkbox" id="prod_modulo" name="product_line" value="Módulo Reubicable" class="hidden">
                        <label for="prod_modulo" class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all">
                            <span>Módulos Reubicables</span> <i class="fa-solid fa-warehouse text-slate-500"></i>
                        </label>
                    </div>
                    <div>
                        <input type="checkbox" id="prod_booth" name="product_line" value="Mobile Booth" class="hidden">
                        <label for="prod_booth" class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all">
                            <span>Mobile Booths</span> <i class="fa-solid fa-door-open text-slate-500"></i>
                        </label>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Esquema Comercial *</label>
                <div class="grid grid-cols-4 gap-2 text-center text-[11px]">
                    <label class="cursor-pointer">
                        <input type="radio" name="acquisition_type" value="Venta" required class="peer hidden">
                        <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all text-white">Venta</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="acquisition_type" value="Renta" class="peer hidden">
                        <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all text-white">Renta</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="acquisition_type" value="Financiamiento" class="peer hidden">
                        <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all text-white">Financ.</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="acquisition_type" value="Leasing" class="peer hidden">
                        <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all text-white">Leasing</div>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Estado y Ciudad del Proyecto *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-map-location-dot text-sm"></i></span>
                    <input type="text" id="project_location" required class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Ej. Celaya, Gto.">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" id="submit-btn" class="w-full py-3 bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 text-white font-bold rounded-xl shadow-lg shadow-orange-950/20 transition-all flex items-center justify-center gap-2 text-sm tracking-wider uppercase">
                    Guardar Registro en Campo <i class="fa-solid fa-cloud-arrow-up"></i>
                </button>
            </div>
        </form>
    </div>

    <script>
        function handleFormSubmit(event) {
            event.preventDefault();

            // ⚠️ PEGA AQUÍ LA NUEVA URL DE GOOGLE APP SCRIPT GENERADA PARA ESTE SEGUNDO FORMULARIO
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJH1JwisTQsCTH9uhU27mFHNA5pkQHaaAZGrKdgLkymORiZNAkZB6wmFli9_scqk16aA/exec";

            // Validar que al menos un espacio esté seleccionado
            const checkboxes = document.querySelectorAll('input[name="product_line"]:checked');
            if (checkboxes.length === 0) {
                alert("Por favor, selecciona al menos una línea de Espacio Requerido.");
                return;
            }

            // Unir los productos seleccionados separados por comas (Ej: "Caseta Móvil, Flexpace")
            const productosSeleccionados = Array.from(checkboxes).map(cb => cb.value).join(", ");

            const submitBtn = document.getElementById("submit-btn");
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = "Guardando en la Nube... <i class='fa-solid fa-spinner animate-spin ml-2'></i>";
            submitBtn.disabled = true;

            const formData = new URLSearchParams();
            formData.append("vendedor", document.getElementById("vendedor").value);
            formData.append("sucursal", document.getElementById("sucursal").value);
            formData.append("contacto", document.getElementById("contact_name").value);
            formData.append("empresa", document.getElementById("company_name").value);
            formData.append("telefono", document.getElementById("phone").value || "No proporcionado");
            formData.append("correo", document.getElementById("email").value || "No proporcionado");
            formData.append("productos", productosSeleccionados);
            formData.append("esquema", document.querySelector('input[name="acquisition_type"]:checked').value);
            formData.append("ubicacion", document.getElementById("project_location").value);

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                body: formData,
                mode: "no-cors"
            })
            .then(() => {
                alert("¡Éxito Comercial!\n\nEl registro de campo ha sido guardado de forma directa y exitosa en Google Drive.");
                document.getElementById("campo-form").reset();
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Hubo un error de conexión con Google Sheets.");
            })
            .finally(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
