<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospección de Campo - Kuatro Modulares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; }
        input[type="checkbox"]:checked + label {
            border-color: #f97316;
            background-color: rgba(249, 115, 22, 0.1);
        }
    </style>
</head>
<body class="text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden my-4 block">
        
        <div class="bg-gradient-to-r from-slate-900 to-slate-850 p-6 text-center border-b border-slate-700 space-y-3 w-full block">
            <div class="flex justify-center items-center w-full">
                <img src="https://www.kuatro.com.mx/assets/globales/img/kuatro-logo-dark.png" alt="Logo Kuatro" class="h-10 w-auto object-contain mx-auto block">
            </div>
            
            <h1 class="text-xl font-black text-white tracking-wide uppercase pt-1 block">Prospección de Campo</h1>
            
            <p class="text-xs text-slate-400 block">Registro ágil de nuevas oportunidades comerciales</p>
        </div>
           
        <form id="campo-form" class="p-6 space-y-5" onsubmit="handleFormSubmit(event)">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Vendedor *</label>
                    <select id="vendedor" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm">
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="Lorena">Lorena</option>
                        <option value="Maricela">Maricela</option>
                        <option value="Alejandro">Alejandro</option>
                        <option value="Julieta">Julieta</option>
                        <option value="Johanna">Johanna</option>
                        <option value="Andrea">Andrea</option>
                        <option value="Luz">Luz</option>
                        <option value="Cristel">Cristel</option>
                        <option value="Jesús">Jesús</option>
                        <option value="Oscar">Oscar</option>
                        <option value="Gonzalo">Gonzalo</option>
			<option value="Sofía">Sofía</option>
			<option value="Angélica">Alejandra</option>
			<option value="Alejandra">Alejandra</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Sucursal *</label>
                    <select id="sucursal" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm">
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="México">México</option>
                        <option value="Poza Rica">Poza Rica</option>
                        <option value="Monterrey">Monterrey</option>
                        <option value="Saltillo">Saltillo</option>
                        <option value="Villahermosa">Villahermosa</option>
                        <option value="Querétaro">Querétaro</option>
                        <option value="Mérida">Mérida</option>
                        <option value="Hermosillo">Hermosillo</option>
                    </select>
                </div>
            </div>

            <hr class="border-slate-700 my-2">

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Nombre del Contacto *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-user text-sm"></i></span>
                    <input type="text" id="contact_name" required class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Nombre de la persona">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Empresa / Razón Social *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-building text-sm"></i></span>
                    <input type="text" id="company_name" required class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Nombre del negocio o empresa">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Teléfono <span class="text-slate-500 text-[10px]">(Opcional)</span></label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-phone text-sm"></i></span>
                        <input type="tel" id="phone" class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="10 dígitos">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Correo Electrónico <span class="text-slate-500 text-[10px]">(Opcional)</span></label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-envelope text-sm"></i></span>
                        <input type="email" id="email" class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="correo@empresa.com">
                    </div>
                </div>
            </div>

            <hr class="border-slate-700 my-2">

           <!-- ESPECIFICACIÓN DEL ESPACIO ACTUALIZADO (SELECCIÓN MÚLTIPLE) -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Especificación del Espacio Requerido * <span class="text-orange-400 text-[10px]">(Puedes elegir varios)</span></label>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 text-xs">
                    <div>
                        <input type="checkbox" id="prod_caseta" name="product_line" value="Caseta Móvil" class="hidden">
                        <label for="prod_caseta" class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all">
                            <span>Casetas Móviles</span> <i class="fa-solid fa-trailer text-slate-500"></i>
                        </label>
                    </div>
                    <div>
                        <input type="checkbox" id="prod_flex" name="product_line" value="Flexpace" class="hidden">
                        <label for="prod_flex" class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all">
                            <span>Flexpace</span> <i class="fa-solid fa-cubes-stacked text-slate-500"></i>
                        </label>
                    </div>
                    <div>
                        <input type="checkbox" id="prod_modulo" name="product_line" value="Reubic" class="hidden">
                        <label for="prod_modulo" class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all">
                            <span>Reubic</span> <i class="fa-solid fa-warehouse text-slate-500"></i>
                        </label>
                    </div>
                </div>
            </div>


            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Esquema Comercial <span class="text-slate-500 text-[10px]">(Opcional)</span></label>
                <div class="grid grid-cols-4 gap-2 text-center text-[11px]">
                    <label class="cursor-pointer">
                        <input type="radio" name="acquisition_type" value="Venta" class="peer hidden">
                        <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all text-white">Venta</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="acquisition_type" value="Renta" class="peer hidden">
                        <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all text-white">Renta</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="acquisition_type" value="Financiamiento" class="peer hidden">
                        <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all text-white">Financ.</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="acquisition_type" value="Leasing" class="peer hidden">
                        <div class="p-2 bg-slate-900 border border-slate-700 rounded-lg peer-checked:border-orange-500 peer-checked:bg-orange-500/10 transition-all text-white">Leasing</div>
                    </label>
                </div>
            </div>
<!-- URGENCIA / FECHA ESTIMADA (NUEVO CAMPO OBLIGATORIO) -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Urgencia / Fecha Estimada de Uso *</label>
                <select id="timeframe" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm">
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="Inmediata (en una semana o menos)">Inmediata (en una semana o menos)</option>
                    <option value="Próximos 30 días">Próximos 30 días</option>
                    <option value="En un plazo de 2 a 3 meses">En un plazo de 2 a 3 meses</option>
                    <option value="Sin definir / Solo cotizando para presupuesto futuro">Sin definir / Solo cotizando para presupuesto futuro</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Estado y Ciudad del Proyecto *</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-map-location-dot text-sm"></i></span>
                    <input type="text" id="project_location" required class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Ej. Celaya, Gto.">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Enlace de Google Maps <span class="text-slate-500 text-[10px]">(Opcional)</span></label>
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa-solid fa-location-dot text-red-500 text-sm"></i></span>
                        <input type="url" id="maps_link" class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm" placeholder="Link generado o detectado">
                    </div>
                    <button type="button" onclick="detectarGPS()" id="gps-btn" class="px-3 bg-slate-700 hover:bg-orange-600 rounded-lg border border-slate-600 hover:border-orange-500 text-white transition-all flex items-center gap-1 text-xs font-bold" title="Detectar mi ubicación GPS actual">
                        <i class="fa-solid fa-crosshairs text-sm animate-pulse"></i> GPS
                    </button>
                </div>
            </div>

<!-- NOTAS / OBSERVACIONES (OPCIONAL) -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Notas / Observaciones <span class="text-slate-500 text-[10px]">(Opcional)</span></label>
                <div class="relative">
                    <span class="absolute top-2.5 left-3 text-slate-500"><i class="fa-solid fa-comment-dots text-sm"></i></span>
                    <textarea id="notes" rows="3" class="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-orange-500 text-sm resize-none" placeholder="Detalles adicionales, comentarios del cliente, requerimientos especiales..."></textarea>
                </div>
            </div>


            <div class="pt-2">
                <button type="submit" id="submit-btn" class="w-full py-3 bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 text-white font-bold rounded-xl shadow-lg shadow-orange-950/20 transition-all flex items-center justify-center gap-2 text-sm tracking-wider uppercase">
                    Guardar Registro en Campo <i class="fa-solid fa-cloud-arrow-up"></i>
                </button>
            </div>
        </form>
    </div>

    <script>
        function detectarGPS() {
            const gpsBtn = document.getElementById("gps-btn");
            const mapsInput = document.getElementById("maps_link");
            
            if (!navigator.geolocation) {
                alert("Tu celular o navegador no soporta la detección de GPS.");
                return;
            }

            gpsBtn.innerHTML = "<i class='fa-solid fa-spinner animate-spin'></i> ...";
            gpsBtn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    // Enlace corregido y limpio para Google Maps
                    mapsInput.value = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    gpsBtn.innerHTML = "<i class='fa-solid fa-check text-green-400'></i> Listo";
                    gpsBtn.classList.remove("bg-slate-700");
                    gpsBtn.classList.add("bg-green-950", "border-green-500");
                },
                function (error) {
                    gpsBtn.innerHTML = "<i class='fa-solid fa-crosshairs'></i> GPS";
                    gpsBtn.disabled = false;
                    alert("No pudimos acceder al GPS. Asegúrate de darle permiso de ubicación a la página en tu pantalla.");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function handleFormSubmit(event) {
            event.preventDefault();

            // ⚠️ RECUERDA PEGAR AQUÍ TU URL DE GOOGLE APPS SCRIPT TERMINADA EN /exec
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJH1JwisTQsCTH9uhU27mFHNA5pkQHaaAZGrKdgLkymORiZNAkZB6wmFli9_scqk16aA/exec";

            const checkboxes = document.querySelectorAll('input[name="product_line"]:checked');
            if (checkboxes.length === 0) {
                alert("Por favor, selecciona al menos una línea de Espacio Requerido.");
                return;
            }

            const productosSeleccionados = Array.from(checkboxes).map(cb => cb.value).join(", ");

            const esquemaRadio = document.querySelector('input[name="acquisition_type"]:checked');
            const esquemaValor = esquemaRadio ? esquemaRadio.value : "No definido";

            const submitBtn = document.getElementById("submit-btn");
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = "Guardando en la Nube... <i class='fa-solid fa-spinner animate-spin ml-2'></i>";
            submitBtn.disabled = true;

            const formData = new URLSearchParams();
            formData.append("vendedor", document.getElementById("vendedor").value);
            formData.append("sucursal", document.getElementById("sucursal").value);
            formData.append("contacto", document.getElementById("contact_name").value);
            formData.append("empresa", document.getElementById("company_name").value);
            formData.append("telefono", document.getElementById("phone").value || "No proporcionado");
            formData.append("correo", document.getElementById("email").value || "No proporcionado");
            formData.append("productos", productosSeleccionados);
            formData.append("esquema", esquemaValor);
            formData.append("urgencia", document.getElementById("timeframe").value);
formData.append("ubicacion", document.getElementById("project_location").value);
formData.append("notas", document.getElementById("notes").value || "Sin observaciones");
            formData.append("maps", document.getElementById("maps_link").value || "No proporcionado");

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                body: formData,
                mode: "no-cors"
            })
            .then(() => {
                alert("¡Éxito Comercial!\n\nEl registro de campo ha sido guardado con éxito.");
                document.getElementById("campo-form").reset();
                
                // Resetear botón de GPS
                const gpsBtn = document.getElementById("gps-btn");
                gpsBtn.innerHTML = "<i class='fa-solid fa-crosshairs text-sm animate-pulse'></i> GPS";
                gpsBtn.disabled = false;
                gpsBtn.className = "px-3 bg-slate-700 hover:bg-orange-600 rounded-lg border border-slate-600 hover:border-orange-500 text-white transition-all flex items-center gap-1 text-xs font-bold";
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Hubo un error al conectar.");
            })
            .finally(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
